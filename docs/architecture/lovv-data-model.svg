<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="'Inter', 'Pretendard', -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="rdsBoxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#991B1B"/>
      <stop offset="100%" style="stop-color:#7F1D1D"/>
    </linearGradient>
    <linearGradient id="tblGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1917"/>
      <stop offset="100%" style="stop-color:#292524"/>
    </linearGradient>
    <linearGradient id="ddbBoxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#713F12"/>
      <stop offset="100%" style="stop-color:#422006"/>
    </linearGradient>
    <filter id="shadow3" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <!-- Relationship arrow markers -->
    <marker id="oneToMany" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto" fill="#94A3B8">
      <path d="M 0 4 L 12 0 L 12 8 Z"/>
    </marker>
    <marker id="fkArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#F87171">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="750" fill="url(#bgGrad3)" rx="12"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" fill="#F8FAFC" font-size="20" font-weight="700">Lovv Data Model (ERD + DynamoDB)</text>
  <text x="600" y="56" text-anchor="middle" fill="#94A3B8" font-size="11">RDS MySQL 8.0 (6 Tables) · DynamoDB (8 Tables) · S3 (2 Buckets)</text>

  <!-- ===================== RDS SECTION ===================== -->
  <rect x="30" y="75" width="750" height="590" rx="10" fill="url(#rdsBoxGrad)" opacity="0.3" stroke="#EF4444" stroke-width="1"/>
  <text x="50" y="96" fill="#FCA5A5" font-size="12" font-weight="700">🗄️ RDS MySQL 8.0 (lovvdev · db.t4g.micro)</text>

  <!-- TABLE: users -->
  <rect x="50" y="110" width="220" height="210" rx="6" fill="url(#tblGrad)" filter="url(#shadow3)" stroke="#44403C" stroke-width="0.5"/>
  <rect x="50" y="110" width="220" height="28" rx="6" fill="#EF4444" opacity="0.8"/>
  <text x="160" y="129" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">users</text>
  <text x="62" y="153" fill="#FBBF24" font-size="10" font-weight="600">🔑 id</text><text x="220" y="153" fill="#6B7280" font-size="9" text-anchor="end">CHAR(36) PK</text>
  <text x="62" y="170" fill="#D1D5DB" font-size="10">email</text><text x="220" y="170" fill="#6B7280" font-size="9" text-anchor="end">VARCHAR(255)</text>
  <text x="62" y="187" fill="#D1D5DB" font-size="10">display_name</text><text x="220" y="187" fill="#6B7280" font-size="9" text-anchor="end">VARCHAR(255)</text>
  <text x="62" y="204" fill="#D1D5DB" font-size="10">avatar_url</text><text x="220" y="204" fill="#6B7280" font-size="9" text-anchor="end">TEXT</text>
  <text x="62" y="221" fill="#D1D5DB" font-size="10">birth_date</text><text x="220" y="221" fill="#6B7280" font-size="9" text-anchor="end">DATE</text>
  <text x="62" y="238" fill="#D1D5DB" font-size="10">gender</text><text x="220" y="238" fill="#6B7280" font-size="9" text-anchor="end">VARCHAR(10)</text>
  <text x="62" y="255" fill="#D1D5DB" font-size="10">created_at</text><text x="220" y="255" fill="#6B7280" font-size="9" text-anchor="end">TIMESTAMP</text>
  <text x="62" y="272" fill="#D1D5DB" font-size="10">updated_at</text><text x="220" y="272" fill="#6B7280" font-size="9" text-anchor="end">TIMESTAMP</text>
  <line x1="50" y1="280" x2="270" y2="280" stroke="#44403C" stroke-width="0.5"/>
  <text x="62" y="305" fill="#78716C" font-size="9">Indexes: email (UNIQUE)</text>

  <!-- TABLE: social_accounts -->
  <rect x="300" y="110" width="230" height="210" rx="6" fill="url(#tblGrad)" filter="url(#shadow3)" stroke="#44403C" stroke-width="0.5"/>
  <rect x="300" y="110" width="230" height="28" rx="6" fill="#EF4444" opacity="0.8"/>
  <text x="415" y="129" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">social_accounts</text>
  <text x="312" y="153" fill="#FBBF24" font-size="10" font-weight="600">🔑 id</text><text x="480" y="153" fill="#6B7280" font-size="9" text-anchor="end">CHAR(36) PK</text>
  <text x="312" y="170" fill="#F87171" font-size="10">🔗 user_id</text><text x="480" y="170" fill="#6B7280" font-size="9" text-anchor="end">CHAR(36) FK</text>
  <text x="312" y="187" fill="#D1D5DB" font-size="10">provider</text><text x="480" y="187" fill="#6B7280" font-size="9" text-anchor="end">VARCHAR(50)</text>
  <text x="312" y="204" fill="#D1D5DB" font-size="10">provider_account_id</text><text x="480" y="204" fill="#6B7280" font-size="9" text-anchor="end">VARCHAR(255)</text>
  <text x="312" y="221" fill="#D1D5DB" font-size="10">email</text><text x="480" y="221" fill="#6B7280" font-size="9" text-anchor="end">VARCHAR(255)</text>
  <text x="312" y="238" fill="#D1D5DB" font-size="10">access_token</text><text x="480" y="238" fill="#6B7280" font-size="9" text-anchor="end">TEXT</text>
  <text x="312" y="255" fill="#D1D5DB" font-size="10">refresh_token</text><text x="480" y="255" fill="#6B7280" font-size="9" text-anchor="end">TEXT</text>
  <text x="312" y="272" fill="#D1D5DB" font-size="10">created_at</text><text x="480" y="272" fill="#6B7280" font-size="9" text-anchor="end">TIMESTAMP</text>
  <line x1="300" y1="280" x2="530" y2="280" stroke="#44403C" stroke-width="0.5"/>
  <text x="312" y="305" fill="#78716C" font-size="9">Indexes: (user_id, provider) UNIQUE</text>

  <!-- TABLE: user_preferences -->
  <rect x="555" y="110" width="210" height="190" rx="6" fill="url(#tblGrad)" filter="url(#shadow3)" stroke="#44403C" stroke-width="0.5"/>
  <rect x="555" y="110" width="210" height="28" rx="6" fill="#EF4444" opacity="0.8"/>
  <text x="660" y="129" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">user_preferences</text>
  <text x="567" y="153" fill="#FBBF24" font-size="10" font-weight="600">🔑 id</text><text x="715" y="153" fill="#6B7280" font-size="9" text-anchor="end">BIGINT PK</text>
  <text x="567" y="170" fill="#F87171" font-size="10">🔗 user_id</text><text x="715" y="170" fill="#6B7280" font-size="9" text-anchor="end">CHAR(36) FK</text>
  <text x="567" y="187" fill="#D1D5DB" font-size="10">category</text><text x="715" y="187" fill="#6B7280" font-size="9" text-anchor="end">VARCHAR(50)</text>
  <text x="567" y="204" fill="#D1D5DB" font-size="10">value</text><text x="715" y="204" fill="#6B7280" font-size="9" text-anchor="end">JSON</text>
  <text x="567" y="221" fill="#D1D5DB" font-size="10">created_at</text><text x="715" y="221" fill="#6B7280" font-size="9" text-anchor="end">TIMESTAMP</text>
  <text x="567" y="238" fill="#D1D5DB" font-size="10">updated_at</text><text x="715" y="238" fill="#6B7280" font-size="9" text-anchor="end">TIMESTAMP</text>
  <line x1="555" y1="250" x2="765" y2="250" stroke="#44403C" stroke-width="0.5"/>
  <text x="567" y="275" fill="#78716C" font-size="9">Indexes: (user_id, category) UNIQUE</text>

  <!-- TABLE: itineraries -->
  <rect x="50" y="340" width="230" height="225" rx="6" fill="url(#tblGrad)" filter="url(#shadow3)" stroke="#44403C" stroke-width="0.5"/>
  <rect x="50" y="340" width="230" height="28" rx="6" fill="#EF4444" opacity="0.8"/>
  <text x="165" y="359" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">itineraries</text>
  <text x="62" y="383" fill="#FBBF24" font-size="10" font-weight="600">🔑 id</text><text x="230" y="383" fill="#6B7280" font-size="9" text-anchor="end">CHAR(36) PK</text>
  <text x="62" y="400" fill="#F87171" font-size="10">🔗 user_id</text><text x="230" y="400" fill="#6B7280" font-size="9" text-anchor="end">CHAR(36) FK</text>
  <text x="62" y="417" fill="#D1D5DB" font-size="10">title</text><text x="230" y="417" fill="#6B7280" font-size="9" text-anchor="end">VARCHAR(255)</text>
  <text x="62" y="434" fill="#D1D5DB" font-size="10">description</text><text x="230" y="434" fill="#6B7280" font-size="9" text-anchor="end">TEXT</text>
  <text x="62" y="451" fill="#D1D5DB" font-size="10">city</text><text x="230" y="451" fill="#6B7280" font-size="9" text-anchor="end">VARCHAR(100)</text>
  <text x="62" y="468" fill="#D1D5DB" font-size="10">metadata</text><text x="230" y="468" fill="#6B7280" font-size="9" text-anchor="end">JSON</text>
  <text x="62" y="485" fill="#D1D5DB" font-size="10">created_at</text><text x="230" y="485" fill="#6B7280" font-size="9" text-anchor="end">TIMESTAMP</text>
  <text x="62" y="502" fill="#D1D5DB" font-size="10">updated_at</text><text x="230" y="502" fill="#6B7280" font-size="9" text-anchor="end">TIMESTAMP</text>
  <line x1="50" y1="515" x2="280" y2="515" stroke="#44403C" stroke-width="0.5"/>
  <text x="62" y="545" fill="#78716C" font-size="9">Indexes: user_id, city</text>

  <!-- TABLE: itinerary_items -->
  <rect x="310" y="340" width="220" height="195" rx="6" fill="url(#tblGrad)" filter="url(#shadow3)" stroke="#44403C" stroke-width="0.5"/>
  <rect x="310" y="340" width="220" height="28" rx="6" fill="#EF4444" opacity="0.8"/>
  <text x="420" y="359" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">itinerary_items</text>
  <text x="322" y="383" fill="#FBBF24" font-size="10" font-weight="600">🔑 id</text><text x="480" y="383" fill="#6B7280" font-size="9" text-anchor="end">BIGINT PK</text>
  <text x="322" y="400" fill="#F87171" font-size="10">🔗 itinerary_id</text><text x="480" y="400" fill="#6B7280" font-size="9" text-anchor="end">CHAR(36) FK</text>
  <text x="322" y="417" fill="#D1D5DB" font-size="10">day_number</text><text x="480" y="417" fill="#6B7280" font-size="9" text-anchor="end">INT</text>
  <text x="322" y="434" fill="#D1D5DB" font-size="10">order_index</text><text x="480" y="434" fill="#6B7280" font-size="9" text-anchor="end">INT</text>
  <text x="322" y="451" fill="#D1D5DB" font-size="10">place_name</text><text x="480" y="451" fill="#6B7280" font-size="9" text-anchor="end">VARCHAR(255)</text>
  <text x="322" y="468" fill="#D1D5DB" font-size="10">place_data</text><text x="480" y="468" fill="#6B7280" font-size="9" text-anchor="end">JSON</text>
  <line x1="310" y1="480" x2="530" y2="480" stroke="#44403C" stroke-width="0.5"/>
  <text x="322" y="518" fill="#78716C" font-size="9">Indexes: itinerary_id</text>

  <!-- TABLE: plan_reactions -->
  <rect x="560" y="340" width="210" height="195" rx="6" fill="url(#tblGrad)" filter="url(#shadow3)" stroke="#44403C" stroke-width="0.5"/>
  <rect x="560" y="340" width="210" height="28" rx="6" fill="#EF4444" opacity="0.8"/>
  <text x="665" y="359" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">plan_reactions</text>
  <text x="572" y="383" fill="#FBBF24" font-size="10" font-weight="600">🔑 id</text><text x="720" y="383" fill="#6B7280" font-size="9" text-anchor="end">BIGINT PK</text>
  <text x="572" y="400" fill="#F87171" font-size="10">🔗 user_id</text><text x="720" y="400" fill="#6B7280" font-size="9" text-anchor="end">CHAR(36) FK</text>
  <text x="572" y="417" fill="#F87171" font-size="10">🔗 itinerary_id</text><text x="720" y="417" fill="#6B7280" font-size="9" text-anchor="end">CHAR(36) FK</text>
  <text x="572" y="434" fill="#D1D5DB" font-size="10">reaction_type</text><text x="720" y="434" fill="#6B7280" font-size="9" text-anchor="end">VARCHAR(20)</text>
  <text x="572" y="451" fill="#D1D5DB" font-size="10">created_at</text><text x="720" y="451" fill="#6B7280" font-size="9" text-anchor="end">TIMESTAMP</text>
  <line x1="560" y1="465" x2="770" y2="465" stroke="#44403C" stroke-width="0.5"/>
  <text x="572" y="500" fill="#78716C" font-size="9">Indexes: (user_id, itinerary_id) UNIQUE</text>

  <!-- ===================== RELATIONSHIP LINES ===================== -->
  <!-- users → social_accounts -->
  <line x1="270" y1="170" x2="300" y2="170" stroke="#F87171" stroke-width="2"/>
  <text x="283" y="165" fill="#F87171" font-size="10" text-anchor="middle">1:N</text>

  <!-- users → user_preferences -->
  <line x1="270" y1="200" x2="555" y2="170" stroke="#F87171" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>

  <!-- users → itineraries -->
  <line x1="160" y1="320" x2="160" y2="340" stroke="#F87171" stroke-width="2"/>
  <text x="175" y="335" fill="#F87171" font-size="10">1:N</text>

  <!-- users → plan_reactions -->
  <path d="M 200 320 Q 400 330 615 340" fill="none" stroke="#F87171" stroke-width="1.2" stroke-dasharray="4,2" opacity="0.5"/>

  <!-- itineraries → itinerary_items -->
  <line x1="280" y1="400" x2="310" y2="400" stroke="#F87171" stroke-width="2"/>
  <text x="294" y="395" fill="#F87171" font-size="10" text-anchor="middle">1:N</text>

  <!-- itineraries → plan_reactions -->
  <line x1="280" y1="440" x2="560" y2="417" stroke="#F87171" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>

  <!-- ===================== DYNAMODB SECTION ===================== -->
  <rect x="800" y="75" width="375" height="590" rx="10" fill="url(#ddbBoxGrad)" opacity="0.3" stroke="#FACC15" stroke-width="1"/>
  <text x="820" y="96" fill="#FDE68A" font-size="12" font-weight="700">⚡ DynamoDB (8 Tables · PAY_PER_REQUEST)</text>

  <!-- DDB Table list -->
  <rect x="820" y="110" width="335" height="60" rx="6" fill="#1C1917" stroke="#44403C" stroke-width="0.5" filter="url(#shadow3)"/>
  <text x="835" y="130" fill="#FACC15" font-size="11" font-weight="700">auth_sessions</text>
  <text x="835" y="146" fill="#A8A29E" font-size="9">PK: sessionId · GSI1: refreshTokenHash</text>
  <text x="835" y="160" fill="#78716C" font-size="8">TTL: expiresAt · 리프레시 토큰 세션 관리</text>

  <rect x="820" y="180" width="335" height="60" rx="6" fill="#1C1917" stroke="#44403C" stroke-width="0.5" filter="url(#shadow3)"/>
  <text x="835" y="200" fill="#FACC15" font-size="11" font-weight="700">user_event_logs</text>
  <text x="835" y="216" fill="#A8A29E" font-size="9">PK: pk · SK: sk · GSI1 + GSI3 + GSI4</text>
  <text x="835" y="230" fill="#78716C" font-size="8">TTL: expires_at · 사용자 이벤트 · request trace</text>

  <rect x="820" y="250" width="335" height="60" rx="6" fill="#1C1917" stroke="#44403C" stroke-width="0.5" filter="url(#shadow3)"/>
  <text x="835" y="270" fill="#FACC15" font-size="11" font-weight="700">agent_runs</text>
  <text x="835" y="286" fill="#A8A29E" font-size="9">PK: pk · SK: sk · GSI1 + GSI2 + GSI4</text>
  <text x="835" y="300" fill="#78716C" font-size="8">TTL: expires_at · Agent 실행 상태 이력</text>

  <rect x="820" y="320" width="335" height="50" rx="6" fill="#1C1917" stroke="#44403C" stroke-width="0.5" filter="url(#shadow3)"/>
  <text x="835" y="340" fill="#FACC15" font-size="11" font-weight="700">festival_verify_cache</text>
  <text x="835" y="356" fill="#A8A29E" font-size="9">PK: pk · SK: sk · TTL: expires_at</text>

  <rect x="820" y="380" width="335" height="50" rx="6" fill="#1C1917" stroke="#44403C" stroke-width="0.5" filter="url(#shadow3)"/>
  <text x="835" y="400" fill="#FACC15" font-size="11" font-weight="700">async_jobs</text>
  <text x="835" y="416" fill="#A8A29E" font-size="9">PK: pk · SK: sk · TTL: expires_at</text>

  <rect x="820" y="440" width="335" height="50" rx="6" fill="#1C1917" stroke="#44403C" stroke-width="0.5" filter="url(#shadow3)"/>
  <text x="835" y="460" fill="#FACC15" font-size="11" font-weight="700">api_logs</text>
  <text x="835" y="476" fill="#A8A29E" font-size="9">PK: pk · SK: sk · GSI1: request_id · TTL</text>

  <rect x="820" y="500" width="335" height="50" rx="6" fill="#1C1917" stroke="#44403C" stroke-width="0.5" filter="url(#shadow3)"/>
  <text x="835" y="520" fill="#FACC15" font-size="11" font-weight="700">content_documents</text>
  <text x="835" y="536" fill="#A8A29E" font-size="9">PK: pk · SK: sk · No TTL · 추천 콘텐츠 정규화</text>

  <rect x="820" y="560" width="335" height="50" rx="6" fill="#1C1917" stroke="#44403C" stroke-width="0.5" filter="url(#shadow3)"/>
  <text x="835" y="580" fill="#FACC15" font-size="11" font-weight="700">visitor_statistics</text>
  <text x="835" y="596" fill="#A8A29E" font-size="9">PK: pk · SK: sk · No TTL · 도시별 방문 통계</text>

  <!-- ===================== S3 SECTION ===================== -->
  <rect x="30" y="580" width="750" height="80" rx="8" fill="#1E293B" stroke="#D97706" stroke-width="1" opacity="0.7"/>
  <text x="50" y="600" fill="#D97706" font-size="12" font-weight="700">📦 S3 Buckets</text>
  <rect x="50" y="610" width="330" height="38" rx="5" fill="#292524" stroke="#44403C" stroke-width="0.5"/>
  <text x="62" y="630" fill="#FDE68A" font-size="10" font-weight="600">lovv-data-pipeline-dev</text>
  <text x="62" y="643" fill="#78716C" font-size="9">raw/KR/details/ — 소도시 상세 JSON</text>

  <rect x="400" y="610" width="350" height="38" rx="5" fill="#292524" stroke="#44403C" stroke-width="0.5"/>
  <text x="412" y="630" fill="#FDE68A" font-size="10" font-weight="600">lovv-image-dev-{AccountId}</text>
  <text x="412" y="643" fill="#78716C" font-size="9">avatar/ · content/ · tmp/ — CloudFront OAC 연동</text>

  <!-- ===================== LEGEND ===================== -->
  <rect x="30" y="680" width="1140" height="55" rx="6" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
  <text x="50" y="700" fill="#94A3B8" font-size="10" font-weight="600">LEGEND:</text>
  <text x="110" y="700" fill="#FBBF24" font-size="10">🔑 PK</text>
  <text x="170" y="700" fill="#F87171" font-size="10">🔗 FK</text>
  <line x1="220" y1="696" x2="260" y2="696" stroke="#F87171" stroke-width="2"/>
  <text x="270" y="700" fill="#94A3B8" font-size="10">1:N Relationship</text>
  <line x1="395" y1="696" x2="435" y2="696" stroke="#F87171" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="445" y="700" fill="#94A3B8" font-size="10">Indirect FK</text>
  <rect x="545" y="690" width="12" height="12" rx="2" fill="#EF4444" opacity="0.8"/>
  <text x="565" y="700" fill="#94A3B8" font-size="10">RDS MySQL</text>
  <rect x="645" y="690" width="12" height="12" rx="2" fill="#FACC15"/>
  <text x="665" y="700" fill="#94A3B8" font-size="10">DynamoDB</text>
  <rect x="745" y="690" width="12" height="12" rx="2" fill="#D97706"/>
  <text x="765" y="700" fill="#94A3B8" font-size="10">S3</text>

  <text x="50" y="725" fill="#475569" font-size="9">• DynamoDB: 모두 PAY_PER_REQUEST billing · auth_sessions 외 모든 테이블은 pk/sk composite key 사용</text>
  <text x="50" y="738" fill="#475569" font-size="9">• S3 Image Bucket: CloudFront OAC SigV4 read-only · tmp/ prefix는 7일 lifecycle 만료</text>
</svg>
