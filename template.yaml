  SmallCitiesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: small_cities.app.lambda_handler
      Description: Read-only small-city API backed by S3 raw city detail JSON.
      Timeout: 30
      Environment:
        Variables:
          MAP_CITY_S3_BUCKET: !Ref MapCityS3Bucket
          MAP_CITY_S3_PREFIX: !Ref MapCityS3Prefix
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:ListBucket
              Resource:
                - !Sub arn:${AWS::Partition}:s3:::${MapCityS3Bucket}
              Condition:
                StringLike:
                  s3:prefix:
                    - !Sub ${MapCityS3Prefix}*
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource:
                - !Sub arn:${AWS::Partition}:s3:::${MapCityS3Bucket}/${MapCityS3Prefix}*
      Events:
        ListSmallCities:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/small-cities
        DetailSmallCity:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/small-cities/{cityId}
        PlacesSmallCity:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/small-cities/{cityId}/places
        V1ListSmallCities:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/small-cities
        V1DetailSmallCity:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/small-cities/{cityId}
        V1PlacesSmallCity:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/small-cities/{cityId}/places
        V1MapCities:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/map/cities
        V1MapCityDetail:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/map/cities/{cityId}
        V1MapCityPlaces:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/map/cities/{cityId}/places
        V1MapMarkers:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/map/markers

Outputs:
  LovvApiUrl:
    Description: HTTP API base URL.
    Value: !Sub https://${LovvHttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}
  AuthSessionsTableName:
    Description: DynamoDB table for refresh sessions with TTL.
    Value: !Ref AuthSessionsTableName
  CognitoUserPoolId:
    Condition: CreateCognitoPoC
    Description: Cognito User Pool id for the PoC.
    Value: !Ref LovvCognitoUserPool
  CognitoUserPoolClientId:
    Condition: CreateCognitoPoC
    Description: Cognito User Pool app client id for the PoC.
    Value: !Ref LovvCognitoUserPoolClient
  CognitoHostedUiBaseUrl:
    Condition: CreateCognitoPoC
    Description: Cognito Hosted UI base URL.
    Value: !Sub https://${CognitoHostedUiDomainPrefix}.auth.${AWS::Region}.amazoncognito.com
  CognitoJwtIssuer:
    Condition: CreateCognitoPoC
    Description: Cognito JWT issuer for API Gateway JWT authorizer.
    Value: !Sub https://cognito-idp.${AWS::Region}.${AWS::URLSuffix}/${LovvCognitoUserPool}
