Outputs:
  LovvApiUrl:
    Description: HTTP API base URL.
    Value: !Sub https://${LovvHttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}
  AuthSessionsTableName:
    Description: DynamoDB table for refresh sessions with TTL.
    Value: !Ref AuthSessionsTableName
  CognitoUserPoolId:
    Condition: CreateCognitoPoC
    Description: Cognito User Pool id for the PoC.
    Value: !Ref LovvCognitoUserPool
  CognitoUserPoolClientId:
    Condition: CreateCognitoPoC
    Description: Cognito User Pool app client id for the PoC.
    Value: !Ref LovvCognitoUserPoolClient
  CognitoHostedUiBaseUrl:
    Condition: CreateCognitoPoC
    Description: Cognito Hosted UI base URL.
    Value: !Sub https://${CognitoHostedUiDomainPrefix}.auth.${AWS::Region}.amazoncognito.com
  CognitoJwtIssuer:
    Condition: CreateCognitoPoC
    Description: Cognito JWT issuer for API Gateway JWT authorizer.
    Value: !Sub https://cognito-idp.${AWS::Region}.${AWS::URLSuffix}/${LovvCognitoUserPool}
