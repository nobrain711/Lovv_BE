AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Lovv backend API for social auth, preferences, map/city, mock recommendations, and saved plans.

Parameters:
  AllowedCorsOrigin:
    Type: String
    Default: http://localhost:5173
    Description: Browser origin allowed to send credentialed API requests.
  MapCityS3Bucket:
    Type: String
    Default: lovv-data-pipeline-dev-925273580929
    Description: S3 bucket that stores raw city detail JSON.
  MapCityS3Prefix:
    Type: String
    Default: raw/KR/details/20260609/
    Description: S3 prefix for city-by-city raw detail JSON files.
  AuthTokenSigningSecret:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: Signing secret for service JWT access tokens. Provide through deploy parameters or local env.
  AuthTokenTtlSeconds:
    Type: String
    Default: '900'
    Description: Service access JWT lifetime in seconds.
  AuthRefreshTtlSeconds:
    Type: String
    Default: '1209600'
    Description: Refresh session lifetime in seconds. This value is also used as the DynamoDB TTL offset.
  AuthIssuer:
    Type: String
    Default: lovv-auth
    Description: Service JWT issuer.
  AuthAudience:
    Type: String
    Default: lovv-api
    Description: Service JWT audience.
  AuthRefreshCookieName:
    Type: String
    Default: lovv_session
    Description: HttpOnly Secure refresh-session cookie name.
  GoogleClientId:
    Type: String
    Default: ''
    Description: Google OAuth web client id used to verify Google ID token audience.
  KakaoClientId:
    Type: String
    Default: ''
    Description: Kakao OIDC client/app id used to verify Kakao ID token audience.
  AuroraClusterArn:
    Type: String
    Description: Aurora MySQL cluster/resource ARN for RDS Data API access.
  AuroraSecretArn:
    Type: String
    NoEcho: true
    Description: AWS Secrets Manager secret ARN for Aurora credentials.
  AuroraDatabaseName:
    Type: String
    Description: Aurora MySQL database name.
  UsersTableName:
    Type: String
    Default: users
    Description: Aurora MySQL users table name.
  SocialAccountsTableName:
    Type: String
    Default: social_accounts
    Description: Aurora MySQL social accounts table name.
  PreferencesTableName:
    Type: String
    Default: preferences
    Description: Aurora MySQL preferences table name.
  SavedPlansTableName:
    Type: String
    Default: saved_plans
    Description: Aurora MySQL saved plans table name.

Globals:
  Function:
    Runtime: python3.12
    Architectures:
      - arm64
    Timeout: 10
    MemorySize: 256
    CodeUri: src/
    Environment:
      Variables:
        CORS_ALLOW_ORIGIN: !Ref AllowedCorsOrigin

Resources:
  LovvHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowCredentials: true
        AllowHeaders:
          - Authorization
          - Content-Type
          - Cookie
          - X-CSRF-Token
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowOrigins:
          - !Ref AllowedCorsOrigin
      Auth:
        Authorizers:
          LovvTokenAuthorizer:
            FunctionArn: !GetAtt AuthAuthorizerFunction.Arn
            AuthorizerPayloadFormatVersion: 2.0
            EnableSimpleResponses: true
            Identity:
              Headers:
                - Authorization

  AuthSessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: refreshTokenHash
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: RefreshTokenHashIndex
          KeySchema:
            - AttributeName: refreshTokenHash
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: auth.app.lambda_handler
      Description: Product social auth API for Google/Kakao login, service sessions, current user, and logout.
      Environment:
        Variables:
          AUTH_TOKEN_SIGNING_SECRET: !Ref AuthTokenSigningSecret
          AUTH_TOKEN_TTL_SECONDS: !Ref AuthTokenTtlSeconds
          AUTH_REFRESH_TTL_SECONDS: !Ref AuthRefreshTtlSeconds
          AUTH_REFRESH_COOKIE_NAME: !Ref AuthRefreshCookieName
          AUTH_ISSUER: !Ref AuthIssuer
          AUTH_AUDIENCE: !Ref AuthAudience
          AUTH_SESSIONS_TABLE_NAME: !Ref AuthSessionsTable
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
          KAKAO_CLIENT_ID: !Ref KakaoClientId
          AURORA_CLUSTER_ARN: !Ref AuroraClusterArn
          AURORA_SECRET_ARN: !Ref AuroraSecretArn
          AURORA_DATABASE_NAME: !Ref AuroraDatabaseName
          USERS_TABLE_NAME: !Ref UsersTableName
          SOCIAL_ACCOUNTS_TABLE_NAME: !Ref SocialAccountsTableName
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:Query
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt AuthSessionsTable.Arn
                - !Sub ${AuthSessionsTable.Arn}/index/RefreshTokenHashIndex
            - Effect: Allow
              Action:
                - rds-data:ExecuteStatement
                - rds-data:BatchExecuteStatement
              Resource: !Ref AuroraClusterArn
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref AuroraSecretArn
      Events:
        AuthGoogle:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/auth/google
        AuthKakao:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/auth/kakao
        AuthMe:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/auth/me
            Auth:
              Authorizer: LovvTokenAuthorizer
        AuthSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/auth/session
        AuthLogout:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/auth/logout

  AuthAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: auth.authorizer.lambda_handler
      Description: HTTP API Lambda authorizer for Lovv service access JWTs.
      Environment:
        Variables:
          AUTH_TOKEN_SIGNING_SECRET: !Ref AuthTokenSigningSecret
          AUTH_ISSUER: !Ref AuthIssuer
          AUTH_AUDIENCE: !Ref AuthAudience

  PreferenceFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: preferences.app.lambda_handler
      Description: Authenticated user preference API backed by Aurora MySQL.
      Environment:
        Variables:
          AURORA_CLUSTER_ARN: !Ref AuroraClusterArn
          AURORA_SECRET_ARN: !Ref AuroraSecretArn
          AURORA_DATABASE_NAME: !Ref AuroraDatabaseName
          PREFERENCES_TABLE_NAME: !Ref PreferencesTableName
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - rds-data:ExecuteStatement
                - rds-data:BatchExecuteStatement
              Resource: !Ref AuroraClusterArn
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref AuroraSecretArn
      Events:
        GetPreferences:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/me/preferences
            Auth:
              Authorizer: LovvTokenAuthorizer
        PutPreferences:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: PUT
            Path: /api/v1/me/preferences
            Auth:
              Authorizer: LovvTokenAuthorizer

  AgentCoreFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: agentcore.app.lambda_handler
      Description: Mock recommendation API for frontend integration. Bedrock AgentCore integration is deferred.
      Events:
        CreateRecommendation:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/recommendations

  SavedPlansFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: saved_plans.app.lambda_handler
      Description: Authenticated saved-plan API backed by Aurora MySQL.
      Environment:
        Variables:
          AURORA_CLUSTER_ARN: !Ref AuroraClusterArn
          AURORA_SECRET_ARN: !Ref AuroraSecretArn
          AURORA_DATABASE_NAME: !Ref AuroraDatabaseName
          SAVED_PLANS_TABLE_NAME: !Ref SavedPlansTableName
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - rds-data:ExecuteStatement
                - rds-data:BatchExecuteStatement
              Resource: !Ref AuroraClusterArn
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref AuroraSecretArn
      Events:
        SaveItinerary:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/me/itineraries
            Auth:
              Authorizer: LovvTokenAuthorizer
        ListItineraries:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/me/itineraries
            Auth:
              Authorizer: LovvTokenAuthorizer
        GetItinerary:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/me/itineraries/{itineraryId}
            Auth:
              Authorizer: LovvTokenAuthorizer
        LikeItinerary:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: PUT
            Path: /api/v1/me/itineraries/{itineraryId}/reactions/like
            Auth:
              Authorizer: LovvTokenAuthorizer
        UnlikeItinerary:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: DELETE
            Path: /api/v1/me/itineraries/{itineraryId}/reactions/like
            Auth:
              Authorizer: LovvTokenAuthorizer

  SmallCitiesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: small_cities.app.lambda_handler
      Description: Read-only small-city API backed by S3 raw city detail JSON.
      Environment:
        Variables:
          MAP_CITY_S3_BUCKET: !Ref MapCityS3Bucket
          MAP_CITY_S3_PREFIX: !Ref MapCityS3Prefix
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:ListBucket
              Resource:
                - !Sub arn:${AWS::Partition}:s3:::${MapCityS3Bucket}
              Condition:
                StringLike:
                  s3:prefix:
                    - !Sub ${MapCityS3Prefix}*
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource:
                - !Sub arn:${AWS::Partition}:s3:::${MapCityS3Bucket}/${MapCityS3Prefix}*
      Events:
        ListSmallCities:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/small-cities
        DetailSmallCity:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/small-cities/{cityId}
        PlacesSmallCity:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/small-cities/{cityId}/places
        V1ListSmallCities:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/small-cities
        V1DetailSmallCity:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/small-cities/{cityId}
        V1PlacesSmallCity:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/small-cities/{cityId}/places
        V1MapCities:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/map/cities
        V1MapCityDetail:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/map/cities/{cityId}
        V1MapCityPlaces:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/map/cities/{cityId}/places
        V1MapMarkers:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/map/markers

Outputs:
  LovvApiUrl:
    Description: HTTP API base URL.
    Value: !Sub https://${LovvHttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}
  AuthSessionsTableName:
    Description: DynamoDB table for refresh sessions with TTL.
    Value: !Ref AuthSessionsTable
