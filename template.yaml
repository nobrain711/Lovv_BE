AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Lovv backend API for social auth, preferences, map/city, mock recommendations, and saved plans.

Parameters:
  AllowedCorsOrigin:
    Type: String
    Default: http://localhost:5173,http://127.0.0.1:5173,https://d3nuef0zacpyj.cloudfront.net,https://lovv-admin-web.vercel.app,https://lovv-admin-web-skn26.vercel.app,https://lovv-admin-web-eta.vercel.app
    Description: Comma-separated browser origins allowed to send credentialed API requests.
  MapCityS3Bucket:
    Type: String
    Default: lovv-data-pipeline-dev-925273580929
    Description: S3 bucket that stores raw city detail JSON.
  MapCityS3Prefix:
    Type: String
    Default: raw/KR/details/20260609/
    Description: S3 prefix for city-by-city raw detail JSON files.
  AuthTokenSigningSecretArn:
    Type: String
    Description: Secrets Manager ARN for JWT signing secret.
  AuthTokenTtlSeconds:
    Type: String
    Default: '900'
    Description: Service access JWT lifetime in seconds.
  AuthRefreshTtlSeconds:
    Type: String
    Default: '1209600'
    Description: Refresh session lifetime in seconds. This value is also used as the DynamoDB TTL offset.
  AuthIssuer:
    Type: String
    Default: lovv-auth
    Description: Service JWT issuer.
  AuthAudience:
    Type: String
    Default: lovv-api
    Description: Service JWT audience.
  AuthRefreshCookieName:
    Type: String
    Default: lovv_session
    Description: HttpOnly Secure refresh-session cookie name.
  AuthRefreshCookieSameSite:
    Type: String
    Default: None
    AllowedValues:
      - Strict
      - Lax
      - None
    Description: SameSite attribute for the refresh-session cookie. Use None with Secure for cross-site frontend domains.
  AuthRefreshCookieSecure:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Whether the refresh-session cookie includes the Secure attribute.
  AuthRefreshCookieDomain:
    Type: String
    Default: ''
    Description: Optional Domain attribute for the refresh-session cookie.
  AuthRefreshCookiePath:
    Type: String
    Default: /
    Description: Path attribute for the refresh-session cookie.
  GoogleClientId:
    Type: String
    Default: ''
    Description: Google OAuth web client id used to verify Google ID token audience.
  GoogleClientSecret:
    Type: String
    Default: ''
    NoEcho: true
    Description: Google OAuth web client secret used only for authorization-code exchange.
  KakaoClientId:
    Type: String
    Default: ''
    Description: Kakao OIDC client/app id used to verify Kakao ID token audience.
  KakaoClientSecret:
    Type: String
    Default: ''
    NoEcho: true
    Description: Optional Kakao client secret used when Kakao authorization-code exchange requires it.
  EnableCognitoPoC:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Create Cognito User Pool, Hosted UI, Google IdP, and Kakao OIDC IdP PoC resources when true.
  CognitoJwtIssuer:
    Type: String
    Default: https://replace-with-cognito-issuer.example
    Description: Existing Cognito JWT issuer for the bridge route when EnableCognitoPoC is false.
  CognitoJwtAudience:
    Type: String
    Default: replace-with-cognito-app-client-id
    Description: Existing Cognito app client id for the bridge route when EnableCognitoPoC is false.
  CognitoUserPoolName:
    Type: String
    Default: lovv-auth-users
    Description: Cognito User Pool name for the PoC resources.
  CognitoUserPoolClientName:
    Type: String
    Default: lovv-web
    Description: Cognito User Pool app client name for Hosted UI auth code flow.
  CognitoHostedUiDomainPrefix:
    Type: String
    Default: lovv-auth-replace-me
    Description: Globally unique Cognito Hosted UI domain prefix. Replace before deployment.
  CognitoCallbackUrls:
    Type: CommaDelimitedList
    Default: http://localhost:5173/auth/callback/cognito,http://127.0.0.1:5173/auth/callback/cognito,https://d3nuef0zacpyj.cloudfront.net/auth/callback/cognito
    Description: Comma-separated Cognito OAuth callback URLs. Use HTTPS except localhost/127.0.0.1.
  CognitoLogoutUrls:
    Type: CommaDelimitedList
    Default: http://localhost:5173/,http://127.0.0.1:5173/,https://d3nuef0zacpyj.cloudfront.net/
    Description: Comma-separated Cognito OAuth logout redirect URLs. Use HTTPS except localhost/127.0.0.1.
  CognitoGoogleClientId:
    Type: String
    Default: ''
    Description: Google OAuth client id for Cognito Hosted UI.
  CognitoGoogleClientSecret:
    Type: String
    Default: ''
    NoEcho: true
    Description: Google OAuth client secret for Cognito Hosted UI. Provide through deploy parameters or CI secrets.
  CognitoKakaoClientId:
    Type: String
    Default: ''
    Description: Kakao OIDC client id for Cognito Hosted UI.
  CognitoKakaoClientSecret:
    Type: String
    Default: ''
    NoEcho: true
    Description: Kakao OIDC client secret for Cognito Hosted UI. Provide through deploy parameters or CI secrets.
  CognitoKakaoOidcIssuer:
    Type: String
    Default: https://kauth.kakao.com
    Description: Kakao OIDC issuer URL for Cognito OIDC IdP.
  CognitoKakaoAuthorizeScopes:
    Type: String
    Default: openid profile_nickname profile_image account_email
    Description: Kakao OIDC scopes requested by Cognito.
  RdsHost:
    Type: String
    Description: Existing Lovv Data Stack RDS endpoint host.
  RdsSecretArn:
    Type: String
    NoEcho: true
    Description: Existing Lovv Data Stack Secrets Manager secret ARN for RDS credentials.
  RdsDatabaseName:
    Type: String
    Default: lovvdev
    Description: Existing Lovv Data Stack MySQL database name.
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Existing Lovv Data Stack VPC ID for Lambda RDS access.
  PrivateSubnetA:
    Type: AWS::EC2::Subnet::Id
    Description: Existing Lovv Data Stack private subnet A ID.
  PrivateSubnetC:
    Type: AWS::EC2::Subnet::Id
    Description: Existing Lovv Data Stack private subnet C ID.
  AuthSessionsTableName:
    Type: String
    Default: lovv_dev_auth_sessions
    Description: Existing Lovv Data Stack DynamoDB auth sessions table name.
  AuthAuthzCacheTableName:
    Type: String
    Default: lovv_dev_admin_authz_cache
    Description: DynamoDB table caching derived admin authorization (roles/org/region) with TTL.
  UsersTableName:
    Type: String
    Default: users
    Description: MySQL users table name.
  SocialAccountsTableName:
    Type: String
    Default: social_accounts
    Description: MySQL social accounts table name.
  PreferencesTableName:
    Type: String
    Default: user_preferences
    Description: MySQL preferences table name.
  SavedPlansTableName:
    Type: String
    Default: itineraries
    Description: MySQL itineraries table name for saved plans.
  ItineraryItemsTableName:
    Type: String
    Default: itinerary_items
    Description: MySQL itinerary items table name.
  PlanReactionsTableName:
    Type: String
    Default: plan_reactions
    Description: MySQL plan reactions table name.
  UserRoleAssignmentsTableName:
    Type: String
    Default: user_role_assignments
    Description: MySQL user role assignments table name for admin RBAC.
  UserRegionAssignmentsTableName:
    Type: String
    Default: user_region_assignments
    Description: MySQL user region assignments table name for admin RBAC.
  AdminDataProposalsTableName:
    Type: String
    Default: admin_data_proposals
    Description: MySQL admin data proposals table name.
  AdminDataProposalHistoryTableName:
    Type: String
    Default: admin_data_proposal_history
    Description: MySQL admin data proposal history table name.

Globals:
  Function:
    Runtime: python3.12
    Architectures:
      - arm64
    Timeout: 10
    MemorySize: 256
    CodeUri: src/
    Environment:
      Variables:
        CORS_ALLOW_ORIGIN: !Select [0, !Split [",", !Ref AllowedCorsOrigin]]
        CORS_ALLOW_ORIGINS: !Ref AllowedCorsOrigin

Conditions:
  CreateCognitoPoC: !Equals [!Ref EnableCognitoPoC, 'true']

Resources:
  LovvHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowCredentials: true
        AllowHeaders:
          - Authorization
          - Content-Type
          - Cookie
          - X-CSRF-Token
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        AllowOrigins:
          - http://127.0.0.1:5173
          - http://localhost:5173
          - https://d3nuef0zacpyj.cloudfront.net
          - https://dkyiemfaw3g04.cloudfront.net
          - https://lovv-admin-web.vercel.app
          - https://lovv-admin-web-skn26.vercel.app
          - https://lovv-admin-web-eta.vercel.app
      Auth:
        Authorizers:
          LovvTokenAuthorizer:
            FunctionArn: !GetAtt AuthAuthorizerFunction.Arn
            AuthorizerPayloadFormatVersion: '2.0'
            EnableSimpleResponses: true
            Identity:
              Headers:
                - Authorization
          LovvCognitoJwtAuthorizer:
            JwtConfiguration:
              issuer: !If
                - CreateCognitoPoC
                - !Sub https://cognito-idp.${AWS::Region}.${AWS::URLSuffix}/${LovvCognitoUserPool}
                - !Ref CognitoJwtIssuer
              audience:
                - !If
                  - CreateCognitoPoC
                  - !Ref LovvCognitoUserPoolClient
                  - !Ref CognitoJwtAudience
            IdentitySource: "$request.header.Authorization"

  LovvCognitoUserPool:
    Type: AWS::Cognito::UserPool
    Condition: CreateCognitoPoC
    Properties:
      UserPoolName: !Ref CognitoUserPoolName
      AutoVerifiedAttributes:
        - email
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Schema:
        - Name: email
          Required: false
          Mutable: true
        - Name: name
          Required: false
          Mutable: true
        - Name: picture
          Required: false
          Mutable: true

  LovvGoogleIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Condition: CreateCognitoPoC
    Properties:
      UserPoolId: !Ref LovvCognitoUserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Ref CognitoGoogleClientId
        client_secret: !Ref CognitoGoogleClientSecret
        authorize_scopes: profile email openid
      AttributeMapping:
        email: email
        name: name
        picture: picture

  LovvKakaoIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Condition: CreateCognitoPoC
    Properties:
      UserPoolId: !Ref LovvCognitoUserPool
      ProviderName: Kakao
      ProviderType: OIDC
      ProviderDetails:
        client_id: !Ref CognitoKakaoClientId
        client_secret: !Ref CognitoKakaoClientSecret
        attributes_request_method: GET
        oidc_issuer: !Ref CognitoKakaoOidcIssuer
        authorize_scopes: !Ref CognitoKakaoAuthorizeScopes
      AttributeMapping:
        email: email
        name: nickname
        picture: picture
      IdpIdentifiers:
        - kakao

  LovvCognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Condition: CreateCognitoPoC
    DependsOn:
      - LovvGoogleIdentityProvider
      - LovvKakaoIdentityProvider
    Properties:
      UserPoolId: !Ref LovvCognitoUserPool
      ClientName: !Ref CognitoUserPoolClientName
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      EnableTokenRevocation: true
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      SupportedIdentityProviders:
        - Google
        - Kakao
      CallbackURLs: !Ref CognitoCallbackUrls
      LogoutURLs: !Ref CognitoLogoutUrls
      DefaultRedirectURI: !Select [0, !Ref CognitoCallbackUrls]
      ReadAttributes:
        - email
        - email_verified
        - name
        - picture
      WriteAttributes:
        - email
        - name
        - picture

  LovvCognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Condition: CreateCognitoPoC
    Properties:
      Domain: !Ref CognitoHostedUiDomainPrefix
      UserPoolId: !Ref LovvCognitoUserPool

  AppFunctionSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lovv API Lambda access to the existing Data Stack VPC.
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  # Managed cache table for derived admin authorization. Items carry an
  # expiresAt epoch; DynamoDB TTL auto-purges them after the cache window.
  AdminAuthzCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref AuthAuthzCacheTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: auth.app.lambda_handler
      Description: Product social auth API for Google/Kakao login, service sessions, current user, and logout.
      Environment:
        Variables:
          AUTH_TOKEN_SIGNING_SECRET_ARN: !Ref AuthTokenSigningSecretArn
          AUTH_TOKEN_TTL_SECONDS: !Ref AuthTokenTtlSeconds
          AUTH_REFRESH_TTL_SECONDS: !Ref AuthRefreshTtlSeconds
          AUTH_REFRESH_COOKIE_NAME: !Ref AuthRefreshCookieName
          AUTH_REFRESH_COOKIE_SAMESITE: !Ref AuthRefreshCookieSameSite
          AUTH_REFRESH_COOKIE_SECURE: !Ref AuthRefreshCookieSecure
          AUTH_REFRESH_COOKIE_DOMAIN: !Ref AuthRefreshCookieDomain
          AUTH_REFRESH_COOKIE_PATH: !Ref AuthRefreshCookiePath
          AUTH_ISSUER: !Ref AuthIssuer
          AUTH_AUDIENCE: !Ref AuthAudience
          AUTH_SESSIONS_TABLE_NAME: !Ref AuthSessionsTableName
          AUTH_AUTHZ_CACHE_TABLE_NAME: !Ref AuthAuthzCacheTableName
          ADMIN_AUTHZ_CACHE_TTL_SECONDS: '300'
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
          GOOGLE_CLIENT_SECRET: !Ref GoogleClientSecret
          KAKAO_CLIENT_ID: !Ref KakaoClientId
          KAKAO_CLIENT_SECRET: !Ref KakaoClientSecret
          DB_ACCESS_MODE: mysql
          RDS_HOST: !Ref RdsHost
          RDS_SECRET_ARN: !Ref RdsSecretArn
          RDS_DATABASE_NAME: !Ref RdsDatabaseName
          USERS_TABLE_NAME: !Ref UsersTableName
          SOCIAL_ACCOUNTS_TABLE_NAME: !Ref SocialAccountsTableName
      VpcConfig:
        SecurityGroupIds:
          - !Ref AppFunctionSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnetA
      Policies:
        - AWSLambdaVPCAccessExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:Query
                - dynamodb:UpdateItem
              Resource:
                - !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AuthSessionsTableName}
                - !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AuthSessionsTableName}/index/GSI1RefreshTokenHashLookup
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:DeleteItem
              Resource:
                - !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AuthAuthzCacheTableName}
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Ref RdsSecretArn
                - !Ref AuthTokenSigningSecretArn
      Events:
        AuthGoogle:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/auth/google
        AuthKakao:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/auth/kakao
        AuthCognitoSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/auth/cognito/session
            Auth:
              Authorizer: LovvCognitoJwtAuthorizer
        AuthMe:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/auth/me
        AuthUpdateMe:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: PATCH
            Path: /api/v1/auth/me
            Auth:
              Authorizer: LovvTokenAuthorizer
        AuthListSocialAccounts:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/auth/social-accounts
            Auth:
              Authorizer: LovvTokenAuthorizer
        AuthLinkGoogle:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/auth/link/google
            Auth:
              Authorizer: LovvTokenAuthorizer
        AuthLinkKakao:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/auth/link/kakao
            Auth:
              Authorizer: LovvTokenAuthorizer
        AuthSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/auth/session
        AuthLogout:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/auth/logout

  AuthAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: auth.authorizer.lambda_handler
      Description: HTTP API Lambda authorizer for Lovv service access JWTs.
      Environment:
        Variables:
          AUTH_TOKEN_SIGNING_SECRET_ARN: !Ref AuthTokenSigningSecretArn
          AUTH_ISSUER: !Ref AuthIssuer
          AUTH_AUDIENCE: !Ref AuthAudience
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref AuthTokenSigningSecretArn

  AuthAuthorizerInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref AuthAuthorizerFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${LovvHttpApi}/authorizers/*

  AdminFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: admin.app.lambda_handler
      Description: Admin console API for users and public data proposal registration/review foundation.
      Environment:
        Variables:
          DB_ACCESS_MODE: mysql
          RDS_HOST: !Ref RdsHost
          RDS_SECRET_ARN: !Ref RdsSecretArn
          RDS_DATABASE_NAME: !Ref RdsDatabaseName
          USERS_TABLE_NAME: !Ref UsersTableName
          SOCIAL_ACCOUNTS_TABLE_NAME: !Ref SocialAccountsTableName
          USER_ROLE_ASSIGNMENTS_TABLE_NAME: !Ref UserRoleAssignmentsTableName
          USER_REGION_ASSIGNMENTS_TABLE_NAME: !Ref UserRegionAssignmentsTableName
          PREFERENCES_TABLE_NAME: !Ref PreferencesTableName
          SAVED_PLANS_TABLE_NAME: !Ref SavedPlansTableName
          ADMIN_DATA_PROPOSALS_TABLE_NAME: !Ref AdminDataProposalsTableName
          ADMIN_DATA_PROPOSAL_HISTORY_TABLE_NAME: !Ref AdminDataProposalHistoryTableName
          MONTHLY_CURATED_DESTINATIONS_TABLE_NAME: monthly_curated_destinations
          ADMIN_PUBLISH_JOBS_TABLE_NAME: admin_publish_jobs
          ADMIN_AUDIT_LOGS_TABLE_NAME: admin_audit_logs
          DESTINATION_METRICS_DAILY_TABLE_NAME: destination_metrics_daily
          ADMIN_NOTICES_TABLE_NAME: admin_notices
          ADMIN_RECOMMENDATION_POLICIES_TABLE_NAME: admin_recommendation_policies
      VpcConfig:
        SecurityGroupIds:
          - !Ref AppFunctionSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnetA
      Policies:
        - AWSLambdaVPCAccessExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref RdsSecretArn
      Events:
        AdminListUsers:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/admin/users
            Auth:
              Authorizer: LovvTokenAuthorizer
        AdminGetUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/admin/users/{userId}
            Auth:
              Authorizer: LovvTokenAuthorizer
        AdminCreateDataProposal:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/admin/data-proposals
            Auth:
              Authorizer: LovvTokenAuthorizer
        AdminListDataProposals:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/admin/data-proposals
            Auth:
              Authorizer: LovvTokenAuthorizer
        AdminGetDataProposal:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/admin/data-proposals/{proposalId}
            Auth:
              Authorizer: LovvTokenAuthorizer
        AdminReviewDataProposal:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/admin/data-proposals/{proposalId}/review
            Auth:
              Authorizer: LovvTokenAuthorizer
        AdminApproveDataProposal:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/admin/data-proposals/{proposalId}/approve
            Auth:
              Authorizer: LovvTokenAuthorizer
        AdminRejectDataProposal:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/admin/data-proposals/{proposalId}/reject
            Auth:
              Authorizer: LovvTokenAuthorizer
        AdminListDataProposalHistory:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/admin/data-proposals/{proposalId}/history
            Auth:
              Authorizer: LovvTokenAuthorizer
        AdminPromoteMonthlyDestination:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/admin/monthly-destinations
            Auth:
              Authorizer: LovvTokenAuthorizer
        AdminListMonthlyDestinations:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/admin/monthly-destinations
            Auth:
              Authorizer: LovvTokenAuthorizer
        AdminGetMonthlyDestination:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/admin/monthly-destinations/{destinationId}
            Auth:
              Authorizer: LovvTokenAuthorizer
        AdminScheduleMonthlyDestination:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/admin/monthly-destinations/{destinationId}/schedule
            Auth:
              Authorizer: LovvTokenAuthorizer
        AdminPublishMonthlyDestination:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/admin/monthly-destinations/{destinationId}/publish
            Auth:
              Authorizer: LovvTokenAuthorizer
        AdminHideMonthlyDestination:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/admin/monthly-destinations/{destinationId}/hide
            Auth:
              Authorizer: LovvTokenAuthorizer
        AdminExpireMonthlyDestination:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/admin/monthly-destinations/{destinationId}/expire
            Auth:
              Authorizer: LovvTokenAuthorizer
        AdminRejectMonthlyDestination:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/admin/monthly-destinations/{destinationId}/reject
            Auth:
              Authorizer: LovvTokenAuthorizer
        AdminRecordMonthlyDestinationEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/admin/monthly-destinations/{destinationId}/events
            Auth:
              Authorizer: LovvTokenAuthorizer
        AdminListMonthlyDestinationMetrics:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/admin/monthly-destinations/{destinationId}/metrics
            Auth:
              Authorizer: LovvTokenAuthorizer
        AdminListDestinationMetricsSummary:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/admin/metrics/destinations
            Auth:
              Authorizer: LovvTokenAuthorizer
        AdminListDestinationPublishJobs:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/admin/monthly-destinations/{destinationId}/publish-jobs
            Auth:
              Authorizer: LovvTokenAuthorizer
        AdminStartPublishJob:
          Type: HttpApi
          Properties:
