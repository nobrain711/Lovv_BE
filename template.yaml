# ==============================================================================
# 템플릿 메타데이터 및 변수 정의 (AWSTemplateFormatVersion & Transform)
# ==============================================================================
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Lovv backend API for social auth, preferences, map/city, mock recommendations, and saved plans.

# ==============================================================================
# 입력 파라미터 (Parameters)
# ==============================================================================
Parameters:
  EnvName:
    Type: String
    Default: dev
    AllowedPattern: "^[a-z][a-z0-9-]{1,20}$"
    Description: Lowercase environment name used in resource names and SSM parameter paths. # 리소스 식별 및 SSM 경로용 환경 이름 (dev, poc, prod 등)
  LogRetentionInDays:
    Type: Number
    Default: 7
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653]
    Description: CloudWatch Logs retention period in days. # CloudWatch 로그 보관 일수 (PoC는 7일 권장)
  AllowedCorsOrigin:
    Type: String
    Default: http://localhost:5173,http://127.0.0.1:5173,https://d3nuef0zacpyj.cloudfront.net
    Description: Comma-separated browser origins allowed to send credentialed API requests.
  MapCityS3Bucket:
    Type: String
    Default: lovv-data-pipeline-dev-925273580929
    Description: S3 bucket that stores raw city detail JSON.
  MapCityS3Prefix:
    Type: String
    Default: raw/KR/details/20260609/
    Description: S3 prefix for city-by-city raw detail JSON files.
  AuthTokenSigningSecretArn:
    Type: String
    Description: Secrets Manager ARN for JWT signing secret.
  AuthTokenTtlSeconds:
    Type: String
    Default: '900'
    Description: Service access JWT lifetime in seconds.
  AuthRefreshTtlSeconds:
    Type: String
    Default: '1209600'
    Description: Refresh session lifetime in seconds. This value is also used as the DynamoDB TTL offset.
  AuthIssuer:
    Type: String
    Default: lovv-auth
    Description: Service JWT issuer.
  AuthAudience:
    Type: String
    Default: lovv-api
    Description: Service JWT audience.
  AuthRefreshCookieName:
    Type: String
    Default: lovv_session
    Description: HttpOnly Secure refresh-session cookie name.
  AuthRefreshCookieSameSite:
    Type: String
    Default: None
    AllowedValues:
      - Strict
      - Lax
      - None
    Description: SameSite attribute for the refresh-session cookie. Use None with Secure for cross-site frontend domains.
  AuthRefreshCookieSecure:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Whether the refresh-session cookie includes the Secure attribute.
  AuthRefreshCookieDomain:
    Type: String
    Default: ''
    Description: Optional Domain attribute for the refresh-session cookie.
  AuthRefreshCookiePath:
    Type: String
    Default: /
    Description: Path attribute for the refresh-session cookie.
  GoogleClientId:
    Type: String
    Default: ''
    Description: Google OAuth web client id used to verify Google ID token audience.
  GoogleClientSecret:
    Type: String
    Default: ''
    NoEcho: true
    Description: Google OAuth web client secret used only for authorization-code exchange.
  KakaoClientId:
    Type: String
    Default: ''
    Description: Kakao OIDC client/app id used to verify Kakao ID token audience.
  KakaoClientSecret:
    Type: String
    Default: ''
    NoEcho: true
    Description: Optional Kakao client secret used when Kakao authorization-code exchange requires it.
  EnableCognitoPoC:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Create Cognito User Pool, Hosted UI, Google IdP, and Kakao OIDC IdP PoC resources when true.
  CognitoJwtIssuer:
    Type: String
    Default: https://replace-with-cognito-issuer.example
    Description: Existing Cognito JWT issuer for the bridge route when EnableCognitoPoC is false.
  CognitoJwtAudience:
    Type: String
    Default: replace-with-cognito-app-client-id
    Description: Existing Cognito app client id for the bridge route when EnableCognitoPoC is false.
  CognitoUserPoolName:
    Type: String
    Default: lovv-auth-users
    Description: Cognito User Pool name for the PoC resources.
  CognitoUserPoolClientName:
    Type: String
    Default: lovv-web
    Description: Cognito User Pool app client name for Hosted UI auth code flow.
  CognitoHostedUiDomainPrefix:
    Type: String
    Default: lovv-auth-replace-me
    Description: Globally unique Cognito Hosted UI domain prefix. Replace before deployment.
  CognitoCallbackUrls:
    Type: CommaDelimitedList
    Default: http://localhost:5173/auth/callback/cognito,http://127.0.0.1:5173/auth/callback/cognito,https://d3nuef0zacpyj.cloudfront.net/auth/callback/cognito
    Description: Comma-separated Cognito OAuth callback URLs. Use HTTPS except localhost/127.0.0.1.
  CognitoLogoutUrls:
    Type: CommaDelimitedList
    Default: http://localhost:5173/,http://127.0.0.1:5173/,https://d3nuef0zacpyj.cloudfront.net/
    Description: Comma-separated Cognito OAuth logout redirect URLs. Use HTTPS except localhost/127.0.0.1.
  CognitoGoogleClientId:
    Type: String
    Default: ''
    Description: Google OAuth client id for Cognito Hosted UI.
  CognitoGoogleClientSecret:
    Type: String
    Default: ''
    NoEcho: true
    Description: Google OAuth client secret for Cognito Hosted UI. Provide through deploy parameters or CI secrets.
  CognitoKakaoClientId:
    Type: String
    Default: ''
    Description: Kakao OIDC client id for Cognito Hosted UI.
  CognitoKakaoClientSecret:
    Type: String
    Default: ''
    NoEcho: true
    Description: Kakao OIDC client secret for Cognito Hosted UI. Provide through deploy parameters or CI secrets.
  CognitoKakaoOidcIssuer:
    Type: String
    Default: https://kauth.kakao.com
    Description: Kakao OIDC issuer URL for Cognito OIDC IdP.
  CognitoKakaoAuthorizeScopes:
    Type: String
    Default: openid profile_nickname profile_image account_email
    Description: Kakao OIDC scopes requested by Cognito.
  RdsHost:
    Type: String
    Description: Existing Lovv Data Stack RDS endpoint host.
  RdsSecretArn:
    Type: String
    NoEcho: true
    Description: Existing Lovv Data Stack Secrets Manager secret ARN for RDS credentials.
  RdsDatabaseName:
    Type: String
    Default: lovvdev
    Description: Existing Lovv Data Stack MySQL database name.
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Existing Lovv Data Stack VPC ID for Lambda RDS access.
  PrivateSubnetA:
    Type: AWS::EC2::Subnet::Id
    Description: Existing Lovv Data Stack private subnet A ID.
  PrivateSubnetC:
    Type: AWS::EC2::Subnet::Id
    Description: Existing Lovv Data Stack private subnet C ID.
  AuthSessionsTableName:
    Type: String
    Default: lovv_dev_auth_sessions
    Description: Existing Lovv Data Stack DynamoDB auth sessions table name.
  UsersTableName:
    Type: String
    Default: users
    Description: MySQL users table name.
  SocialAccountsTableName:
    Type: String
    Default: social_accounts
    Description: MySQL social accounts table name.
  PreferencesTableName:
    Type: String
    Default: user_preferences
    Description: MySQL preferences table name.
  SavedPlansTableName:
    Type: String
    Default: itineraries
    Description: MySQL itineraries table name for saved plans.
  ItineraryItemsTableName:
    Type: String
    Default: itinerary_items
    Description: MySQL itinerary items table name.
  PlanReactionsTableName:
    Type: String
    Default: plan_reactions
    Description: MySQL plan reactions table name.

# ==============================================================================
# 글로벌 기본 설정 (Globals)
# ==============================================================================
Globals:
  Function:
    Runtime: python3.12
    Architectures:
      - arm64
    Timeout: 10
    MemorySize: 256
    CodeUri: src/
    # 모든 Lambda 함수에 공통 적용될 리소스 태그
    Tags:
      Project: Lovv
      Environment: !Ref EnvName
      GithubRepo: https://github.com/Joraemon-s-Secret-Gadgets/Lovv_BE
      ManagedBy: CloudFormation
    Environment:
      Variables:
        CORS_ALLOW_ORIGIN: !Select [0, !Split [",", !Ref AllowedCorsOrigin]]
        CORS_ALLOW_ORIGINS: !Ref AllowedCorsOrigin

# ==============================================================================
# 배포 조건문 정의 (Conditions)
# ==============================================================================
Conditions:
  # Cognito PoC 리소스 생성 여부를 결정하는 조건문
  CreateCognitoPoC: !Equals [!Ref EnableCognitoPoC, 'true']

# ==============================================================================
# 리소스 정의 (Resources)
# ==============================================================================
Resources:
  # Lovv 서비스 통합 HTTP API Gateway
  LovvHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowCredentials: true
        AllowHeaders:
          - Authorization
          - Content-Type
          - Cookie
          - X-CSRF-Token
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        AllowOrigins: !Split [",", !Ref AllowedCorsOrigin]
      Auth:
        Authorizers:
          LovvTokenAuthorizer:
            FunctionArn: !GetAtt AuthAuthorizerFunction.Arn
            AuthorizerPayloadFormatVersion: '2.0'
            EnableSimpleResponses: true
            Identity:
              Headers:
                - Authorization
          LovvCognitoJwtAuthorizer:
            JwtConfiguration:
              issuer: !If
                - CreateCognitoPoC
                - !Sub https://cognito-idp.${AWS::Region}.${AWS::URLSuffix}/${LovvCognitoUserPool}
                - !Ref CognitoJwtIssuer
              audience:
                - !If
                  - CreateCognitoPoC
                  - !Ref LovvCognitoUserPoolClient
                  - !Ref CognitoJwtAudience
            IdentitySource: "$request.header.Authorization"

  LovvCognitoUserPool:
    Type: AWS::Cognito::UserPool
    Condition: CreateCognitoPoC
    Properties:
      UserPoolName: !Ref CognitoUserPoolName
      AutoVerifiedAttributes:
        - email
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Schema:
        - Name: email
          Required: false
          Mutable: true
        - Name: name
          Required: false
          Mutable: true
        - Name: picture
          Required: false
          Mutable: true

  LovvGoogleIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Condition: CreateCognitoPoC
    Properties:
      UserPoolId: !Ref LovvCognitoUserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Ref CognitoGoogleClientId
        client_secret: !Ref CognitoGoogleClientSecret
        authorize_scopes: profile email openid
      AttributeMapping:
        email: email
        name: name
        picture: picture

  LovvKakaoIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Condition: CreateCognitoPoC
    Properties:
      UserPoolId: !Ref LovvCognitoUserPool
      ProviderName: Kakao
      ProviderType: OIDC
      ProviderDetails:
        client_id: !Ref CognitoKakaoClientId
        client_secret: !Ref CognitoKakaoClientSecret
        attributes_request_method: GET
        oidc_issuer: !Ref CognitoKakaoOidcIssuer
        authorize_scopes: !Ref CognitoKakaoAuthorizeScopes
      AttributeMapping:
        email: email
        name: nickname
        picture: picture
      IdpIdentifiers:
        - kakao

  LovvCognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Condition: CreateCognitoPoC
    DependsOn:
      - LovvGoogleIdentityProvider
      - LovvKakaoIdentityProvider
    Properties:
      UserPoolId: !Ref LovvCognitoUserPool
      ClientName: !Ref CognitoUserPoolClientName
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      EnableTokenRevocation: true
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      SupportedIdentityProviders:
        - Google
        - Kakao
      CallbackURLs: !Ref CognitoCallbackUrls
      LogoutURLs: !Ref CognitoLogoutUrls
      DefaultRedirectURI: !Select [0, !Ref CognitoCallbackUrls]
      ReadAttributes:
        - email
        - email_verified
        - name
        - picture
      WriteAttributes:
        - email
        - name
        - picture

  LovvCognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Condition: CreateCognitoPoC
    Properties:
      Domain: !Ref CognitoHostedUiDomainPrefix
      UserPoolId: !Ref LovvCognitoUserPool

  # Lambda 함수가 프라이빗 VPC 내부에서 통신할 수 있게 해주는 보안 그룹
  AppFunctionSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lovv API Lambda access to the existing Data Stack VPC.
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  # 소셜 로그인 및 사용자 세션을 처리하는 Lambda 함수
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: auth.app.lambda_handler
      Description: Product social auth API for Google/Kakao login, service sessions, current user, and logout.
      Environment:
        Variables:
          AUTH_TOKEN_SIGNING_SECRET_ARN: !Ref AuthTokenSigningSecretArn
          AUTH_TOKEN_TTL_SECONDS: !Ref AuthTokenTtlSeconds
          AUTH_REFRESH_TTL_SECONDS: !Ref AuthRefreshTtlSeconds
          AUTH_REFRESH_COOKIE_NAME: !Ref AuthRefreshCookieName
          AUTH_REFRESH_COOKIE_SAMESITE: !Ref AuthRefreshCookieSameSite
          AUTH_REFRESH_COOKIE_SECURE: !Ref AuthRefreshCookieSecure
          AUTH_REFRESH_COOKIE_DOMAIN: !Ref AuthRefreshCookieDomain
          AUTH_REFRESH_COOKIE_PATH: !Ref AuthRefreshCookiePath
          AUTH_ISSUER: !Ref AuthIssuer
          AUTH_AUDIENCE: !Ref AuthAudience
          AUTH_SESSIONS_TABLE_NAME: !Ref AuthSessionsTableName
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
          GOOGLE_CLIENT_SECRET: !Ref GoogleClientSecret
          KAKAO_CLIENT_ID: !Ref KakaoClientId
          KAKAO_CLIENT_SECRET: !Ref KakaoClientSecret
          DB_ACCESS_MODE: mysql
          RDS_HOST: !Ref RdsHost
          RDS_SECRET_ARN: !Ref RdsSecretArn
          RDS_DATABASE_NAME: !Ref RdsDatabaseName
          USERS_TABLE_NAME: !Ref UsersTableName
          SOCIAL_ACCOUNTS_TABLE_NAME: !Ref SocialAccountsTableName
      VpcConfig:
        SecurityGroupIds:
          - !Ref AppFunctionSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnetA
      Policies:
        - AWSLambdaVPCAccessExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:Query
                - dynamodb:UpdateItem
              Resource:
                - !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AuthSessionsTableName}
                - !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AuthSessionsTableName}/index/GSI1RefreshTokenHashLookup
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Ref RdsSecretArn
                - !Ref AuthTokenSigningSecretArn
      Events:
        AuthGoogle:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/auth/google
        AuthKakao:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/auth/kakao
        AuthCognitoSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/auth/cognito/session
            Auth:
              Authorizer: LovvCognitoJwtAuthorizer
        AuthMe:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/auth/me
        AuthUpdateMe:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: PATCH
            Path: /api/v1/auth/me
            Auth:
              Authorizer: LovvTokenAuthorizer
        AuthListSocialAccounts:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/auth/social-accounts
            Auth:
              Authorizer: LovvTokenAuthorizer
        AuthLinkGoogle:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/auth/link/google
            Auth:
              Authorizer: LovvTokenAuthorizer
        AuthLinkKakao:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/auth/link/kakao
            Auth:
              Authorizer: LovvTokenAuthorizer
        AuthSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/auth/session
        AuthLogout:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/auth/logout

  # HTTP API 게이트웨이 요청 시 JWT 인증 유효성을 검증하는 Custom Authorizer Lambda 함수
  AuthAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: auth.authorizer.lambda_handler
      Description: HTTP API Lambda authorizer for Lovv service access JWTs.
      Environment:
        Variables:
          AUTH_TOKEN_SIGNING_SECRET_ARN: !Ref AuthTokenSigningSecretArn
          AUTH_ISSUER: !Ref AuthIssuer
          AUTH_AUDIENCE: !Ref AuthAudience
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref AuthTokenSigningSecretArn

  AuthAuthorizerInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref AuthAuthorizerFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${LovvHttpApi}/authorizers/*

  # 사용자의 온보딩 취향 정보(Preference)를 RDS MySQL에 기록 및 조회하는 Lambda 함수
  PreferenceFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: preferences.app.lambda_handler
      Description: Authenticated user preference API backed by existing Lovv Data Stack MySQL.
      Environment:
        Variables:
          DB_ACCESS_MODE: mysql
          RDS_HOST: !Ref RdsHost
          RDS_SECRET_ARN: !Ref RdsSecretArn
          RDS_DATABASE_NAME: !Ref RdsDatabaseName
          PREFERENCES_TABLE_NAME: !Ref PreferencesTableName
      VpcConfig:
        SecurityGroupIds:
          - !Ref AppFunctionSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnetA
      Policies:
        - AWSLambdaVPCAccessExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref RdsSecretArn
      Events:
        GetPreferences:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/me/preferences
            Auth:
              Authorizer: LovvTokenAuthorizer
        PutPreferences:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: PUT
            Path: /api/v1/me/preferences
            Auth:
              Authorizer: LovvTokenAuthorizer

  # Amazon Bedrock Agent를 호출하여 추천 일정을 생성하는 코어 추천 엔진 Lambda 함수
  AgentCoreFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: agentcore.app.lambda_handler
      Timeout: 120
      Description: AgentCore recommendation API - invokes Bedrock AgentCore runtime.
      Environment:
        Variables:
          BEDROCK_AGENT_ARN: "arn:aws:bedrock-agentcore:us-east-1:925273580929:runtime/myagent_MyAgent-FNVZimELXM"
          CORS_ALLOW_ORIGIN: !Select [0, !Split [",", !Ref AllowedCorsOrigin]]
          CORS_ALLOW_ORIGINS: !Ref AllowedCorsOrigin
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - "bedrock-agentcore:InvokeAgentRuntime"
              Resource: "arn:aws:bedrock-agentcore:us-east-1:925273580929:runtime/myagent_MyAgent-FNVZimELXM*"
      FunctionUrlConfig:
        AuthType: NONE
      Events:
        CreateRecommendation:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/recommendations

  # 인증된 사용자의 일정(Itinerary) 저장, 삭제, 목록조회 및 좋아요 반응을 처리하는 Lambda 함수
  SavedPlansFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: saved_plans.app.lambda_handler
      Description: Authenticated saved-plan API backed by existing Lovv Data Stack MySQL.
      Environment:
        Variables:
          DB_ACCESS_MODE: mysql
          RDS_HOST: !Ref RdsHost
          RDS_SECRET_ARN: !Ref RdsSecretArn
          RDS_DATABASE_NAME: !Ref RdsDatabaseName
          SAVED_PLANS_TABLE_NAME: !Ref SavedPlansTableName
          ITINERARY_ITEMS_TABLE_NAME: !Ref ItineraryItemsTableName
          PLAN_REACTIONS_TABLE_NAME: !Ref PlanReactionsTableName
      VpcConfig:
        SecurityGroupIds:
          - !Ref AppFunctionSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnetA
      Policies:
        - AWSLambdaVPCAccessExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref RdsSecretArn
      Events:
        SaveItinerary:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: POST
            Path: /api/v1/me/itineraries
            Auth:
              Authorizer: LovvTokenAuthorizer
        ListItineraries:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/me/itineraries
            Auth:
              Authorizer: LovvTokenAuthorizer
        GetItinerary:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/v1/me/itineraries/{itineraryId}
            Auth:
              Authorizer: LovvTokenAuthorizer
        DeleteItinerary:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: DELETE
            Path: /api/v1/me/itineraries/{itineraryId}
            Auth:
              Authorizer: LovvTokenAuthorizer
        LikeItinerary:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: PUT
            Path: /api/v1/me/itineraries/{itineraryId}/reactions/like
            Auth:
              Authorizer: LovvTokenAuthorizer
        UnlikeItinerary:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: DELETE
            Path: /api/v1/me/itineraries/{itineraryId}/reactions/like
            Auth:
              Authorizer: LovvTokenAuthorizer

  # S3 버킷 내의 raw JSON을 기반으로 소도시 및 지도 관광 콘텐츠 정보를 제공하는 API Lambda 함수
  SmallCitiesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: small_cities.app.lambda_handler
      Description: Read-only small-city API backed by S3 raw city detail JSON.
      Timeout: 30
      Environment:
        Variables:
          MAP_CITY_S3_BUCKET: !Ref MapCityS3Bucket
          MAP_CITY_S3_PREFIX: !Ref MapCityS3Prefix
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:ListBucket
              Resource:
                - !Sub arn:${AWS::Partition}:s3:::${MapCityS3Bucket}
              Condition:
                StringLike:
                  s3:prefix:
                    - !Sub ${MapCityS3Prefix}*
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource:
                - !Sub arn:${AWS::Partition}:s3:::${MapCityS3Bucket}/${MapCityS3Prefix}*
      Events:
        ListSmallCities:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/small-cities
        DetailSmallCity:
          Type: HttpApi
          Properties:
            ApiId: !Ref LovvHttpApi
            Method: GET
            Path: /api/small-cities/{cityId}
        PlacesSmallCity:
          Type: HttpApi
