AWSTemplateFormatVersion: "2010-09-09"
Description: Lovv stateful data stack outside the AWS SAM application stack.

# 입력 파라미터: dev Data Stack 생성 시 환경명, DB 설정, VPC CIDR을 지정한다.
Parameters:
  EnvName:
    Type: String
    Default: dev
    AllowedPattern: "^[a-z][a-z0-9-]{1,20}$"
    Description: Lowercase environment name used in resource names and SSM parameter paths.
  LovvDbName:
    Type: String
    Default: lovvdev
    AllowedPattern: "^[A-Za-z][A-Za-z0-9]{1,63}$"
    Description: MySQL database name.
  DBInstanceClass:
    Type: String
    Default: db.t4g.micro
    Description: RDS instance class.
  DBAllocatedStorage:
    Type: Number
    Default: 20
    MinValue: 20
    Description: RDS allocated storage in GiB.
  DBMasterUsername:
    Type: String
    Default: lovvadmin
    NoEcho: true
    AllowedPattern: "^[A-Za-z][A-Za-z0-9]{1,15}$"
    Description: RDS master username. Password is generated by RDS managed master user secret.
  RDSDeletionProtection:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Keep true for production-like environments.
  EnableNatInstance:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable the optional dev NAT instance for private subnet internet egress.
  VpcCidr:
    Type: String
    Default: 10.40.0.0/16
    Description: Development VPC CIDR for the data stack.
  PublicSubnetCidr:
    Type: String
    Default: 10.40.1.0/24
    Description: Development public subnet CIDR for the optional NAT instance.
  PrivateSubnetACidr:
    Type: String
    Default: 10.40.10.0/24
    Description: Development private subnet A CIDR.
  PrivateSubnetCCidr:
    Type: String
    Default: 10.40.20.0/24
    Description: Development private subnet C CIDR.
  DevMysqlIngressCidr:
    Type: String
    Default: 10.40.0.0/16
    Description: CIDR allowed to connect to MySQL in development.
  NatInstanceType:
    Type: String
    Default: t4g.nano
    Description: EC2 instance type for the optional dev NAT instance.
  NatInstanceAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64
    Description: Amazon Linux 2023 ARM64 AMI for the optional dev NAT instance.

# 조건: RDS 삭제 보호는 파라미터로 켜고 끌 수 있지만, 기본값은 보호 활성화이다.
Conditions:
  EnableRDSDeletionProtection: !Equals [!Ref RDSDeletionProtection, "true"]
  CreateNatInstance: !Equals [!Ref EnableNatInstance, "true"]

Resources:
  # 개발용 VPC: SAM 앱 스택과 분리된 stateful Data Stack 네트워크 경계이다.
  LovvDevVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub lovv-${EnvName}-vpc
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName
        - Key: StackBoundary
          Value: DataStack

  # RDS 배치를 위한 첫 번째 private subnet이다.
  LovvPrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LovvDevVPC
      CidrBlock: !Ref PrivateSubnetACidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub lovv-${EnvName}-private-a
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName
        - Key: Tier
          Value: private

  # RDS 고가용성 subnet group 구성을 위한 두 번째 private subnet이다.
  LovvPrivateSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LovvDevVPC
      CidrBlock: !Ref PrivateSubnetCCidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub lovv-${EnvName}-private-c
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName
        - Key: Tier
          Value: private

  # NAT 인스턴스용 public subnet이다. 비용과 public egress를 피하기 위해 기본값에서는 생성하지 않는다.
  LovvPublicSubnetA:
    Type: AWS::EC2::Subnet
    Condition: CreateNatInstance
    Properties:
      VpcId: !Ref LovvDevVPC
      CidrBlock: !Ref PublicSubnetCidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub lovv-${EnvName}-public-a
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName
        - Key: Tier
          Value: public

  # NAT 인스턴스 public subnet의 인터넷 출구이다.
  LovvInternetGateway:
    Type: AWS::EC2::InternetGateway
    Condition: CreateNatInstance
    Properties:
      Tags:
        - Key: Name
          Value: !Sub lovv-${EnvName}-igw
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  LovvInternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Condition: CreateNatInstance
    Properties:
      VpcId: !Ref LovvDevVPC
      InternetGatewayId: !Ref LovvInternetGateway

  LovvPublicRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: CreateNatInstance
    Properties:
      VpcId: !Ref LovvDevVPC
      Tags:
        - Key: Name
          Value: !Sub lovv-${EnvName}-public-rt
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  LovvPublicDefaultRoute:
    Type: AWS::EC2::Route
    Condition: CreateNatInstance
    DependsOn: LovvInternetGatewayAttachment
    Properties:
      RouteTableId: !Ref LovvPublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref LovvInternetGateway

  LovvPublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateNatInstance
    Properties:
      SubnetId: !Ref LovvPublicSubnetA
      RouteTableId: !Ref LovvPublicRouteTable

  # private subnet용 route table이다. AWS 서비스 접근은 VPC Endpoint로 처리하고, public egress는 선택 NAT 인스턴스로만 연다.
  LovvPrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref LovvDevVPC
      Tags:
        - Key: Name
          Value: !Sub lovv-${EnvName}-private-rt
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  # private subnet A를 Data Stack private route table에 연결한다.
  LovvPrivateSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref LovvPrivateSubnetA
      RouteTableId: !Ref LovvPrivateRouteTable

  # private subnet C를 Data Stack private route table에 연결한다.
  LovvPrivateSubnetCRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref LovvPrivateSubnetC
      RouteTableId: !Ref LovvPrivateRouteTable

  # RDS MySQL 접근 보안 그룹이다. v0.1은 dev CIDR 기반 접근이며, 이후 Lambda SG 기반 접근으로 강화할 수 있다.
  LovvRDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub Lovv ${EnvName} RDS MySQL access
      VpcId: !Ref LovvDevVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: !Ref DevMysqlIngressCidr
          Description: Development MySQL access CIDR
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub lovv-${EnvName}-rds-sg
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  # Interface VPC Endpoint 보안 그룹이다. private subnet의 Lambda가 HTTPS로 AWS 서비스 endpoint에 접근하도록 허용한다.
  LovvEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub Lovv ${EnvName} interface endpoint HTTPS access
      VpcId: !Ref LovvDevVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref VpcCidr
          Description: Development VPC HTTPS access to interface endpoints
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub lovv-${EnvName}-endpoint-sg
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  # 선택 NAT 인스턴스 보안 그룹이다. public SSH는 열지 않고 VPC 내부 트래픽만 NAT 대상으로 받는다.
  LovvNatInstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: CreateNatInstance
    Properties:
      GroupDescription: !Sub Lovv ${EnvName} optional NAT instance access
      VpcId: !Ref LovvDevVPC
      SecurityGroupIngress:
        - IpProtocol: -1
          CidrIp: !Ref VpcCidr
          Description: Development VPC traffic to NAT instance
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub lovv-${EnvName}-nat-instance-sg
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  # NAT 인스턴스 운영 접근은 SSM Session Manager만 사용한다.
  LovvNatInstanceRole:
    Type: AWS::IAM::Role
    Condition: CreateNatInstance
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  LovvNatInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Condition: CreateNatInstance
    Properties:
      Roles:
        - !Ref LovvNatInstanceRole

  # SSM port forwarding으로 NAT 인스턴스를 경유해 private RDS에 접속할 때만 MySQL을 허용한다.
  LovvRDSIngressFromNatInstance:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: CreateNatInstance
    Properties:
      GroupId: !Ref LovvRDSSecurityGroup
      IpProtocol: tcp
      FromPort: 3306
      ToPort: 3306
      SourceSecurityGroupId: !Ref LovvNatInstanceSecurityGroup
      Description: MySQL access from optional NAT instance for SSM port forwarding

  # Secrets Manager VPC Endpoint: VPC 내부 Lambda가 RDS secret 값을 private 경로로 조회한다.
  SecretsManagerVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref LovvDevVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.secretsmanager
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref LovvPrivateSubnetA
        - !Ref LovvPrivateSubnetC
      SecurityGroupIds:
        - !Ref LovvEndpointSecurityGroup

  # SSM VPC Endpoint: VPC 내부 Lambda가 Parameter Store 값을 private 경로로 조회한다.
  SSMVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref LovvDevVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ssm
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref LovvPrivateSubnetA
        - !Ref LovvPrivateSubnetC
      SecurityGroupIds:
        - !Ref LovvEndpointSecurityGroup

  # DynamoDB Gateway Endpoint: private subnet route table에서 DynamoDB API를 NAT 없이 호출한다.
  DynamoDBGatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref LovvDevVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.dynamodb
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref LovvPrivateRouteTable

  # S3 Gateway Endpoint: private subnet route table에서 S3 API를 NAT 없이 호출한다.
  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref LovvDevVPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref LovvPrivateRouteTable

  # 선택 NAT 인스턴스: dev에서 private subnet의 public HTTPS egress가 필요할 때만 생성한다.
  LovvNatInstance:
    Type: AWS::EC2::Instance
    Condition: CreateNatInstance
    Properties:
      ImageId: !Ref NatInstanceAmiId
      InstanceType: !Ref NatInstanceType
      IamInstanceProfile: !Ref LovvNatInstanceProfile
      SubnetId: !Ref LovvPublicSubnetA
      SecurityGroupIds:
        - !Ref LovvNatInstanceSecurityGroup
      SourceDestCheck: false
      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          sysctl -w net.ipv4.ip_forward=1
          grep -q '^net.ipv4.ip_forward = 1' /etc/sysctl.conf || echo 'net.ipv4.ip_forward = 1' >> /etc/sysctl.conf
          dnf install -y iptables-services
          iptables -t nat -C POSTROUTING -o ens5 -j MASQUERADE || iptables -t nat -A POSTROUTING -o ens5 -j MASQUERADE
          service iptables save
          systemctl enable iptables
          systemctl restart iptables
      Tags:
        - Key: Name
          Value: !Sub lovv-${EnvName}-nat-instance
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName
        - Key: StackBoundary
          Value: DataStack

  LovvPrivateDefaultRouteToNatInstance:
    Type: AWS::EC2::Route
    Condition: CreateNatInstance
    DependsOn: LovvNatInstance
    Properties:
      RouteTableId: !Ref LovvPrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      InstanceId: !Ref LovvNatInstance

  # RDS DB subnet group: RDS가 public subnet이 아닌 private subnet에 생성되도록 강제한다.
  LovvDBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub Lovv ${EnvName} RDS subnet group
      SubnetIds:
        - !Ref LovvPrivateSubnetA
        - !Ref LovvPrivateSubnetC

  # RDS MySQL 원장 DB: 사용자, 소셜 계정, 저장 일정, 일정 항목, 반응 데이터를 저장한다.
  LovvRDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DBInstanceIdentifier: !Sub lovv-${EnvName}-mysql
      DBName: !Ref LovvDbName
      Engine: mysql
      EngineVersion: "8.0"
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: !Ref DBAllocatedStorage
      StorageEncrypted: true
      PubliclyAccessible: false
      BackupRetentionPeriod: 7
      CopyTagsToSnapshot: true
      DeletionProtection: !If [EnableRDSDeletionProtection, true, false]
      DBSubnetGroupName: !Ref LovvDBSubnetGroup
      VPCSecurityGroups:
        - !Ref LovvRDSSecurityGroup
      MasterUsername: !Ref DBMasterUsername
      # master password는 CloudFormation 입력값으로 받지 않고 RDS managed secret으로 자동 생성한다.
      ManageMasterUserPassword: true
      Tags:
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName
        - Key: StackBoundary
          Value: DataStack

  # 사용자 이벤트 로그 테이블: 사용자/익명 세션 이벤트와 request/recommendation trace를 저장한다.
  UserEventLogsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub lovv_${EnvName}_user_event_logs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: request_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
        - AttributeName: event_type_day
          AttributeType: S
        - AttributeName: recommendation_request_id
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        # TTL 삭제 기준은 애플리케이션이 기록하는 expires_at epoch seconds 값이다.
        AttributeName: expires_at
        Enabled: true
      GlobalSecondaryIndexes:
        - IndexName: GSI1RequestLookup
          KeySchema:
            - AttributeName: request_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI3EventTypeDaily
          KeySchema:
            - AttributeName: event_type_day
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI4RecommendationLookup
          KeySchema:
            - AttributeName: recommendation_request_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  # Agent 실행 상태 테이블: Agent run 단위 상태 이력과 trace 조회를 지원한다.
  AgentRunsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub lovv_${EnvName}_agent_runs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: request_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
        - AttributeName: agent_run_id
          AttributeType: S
        - AttributeName: recommendation_request_id
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        # Agent run 보존 기간은 애플리케이션이 expires_at에 반영한다.
        AttributeName: expires_at
        Enabled: true
      GlobalSecondaryIndexes:
        - IndexName: GSI1RequestLookup
          KeySchema:
            - AttributeName: request_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2AgentRunLookup
          KeySchema:
            - AttributeName: agent_run_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI4RecommendationLookup
          KeySchema:
            - AttributeName: recommendation_request_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  # 축제 날짜 검증 캐시 테이블: festival_id + travel_year 기준 검증 결과를 저장한다.
  FestivalVerifyCacheTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub lovv_${EnvName}_festival_verify_cache
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      Tags:
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  # 비동기 작업 상태 테이블: job_id 기준 최신 상태 조회와 이력 추적을 지원한다.
  AsyncJobsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub lovv_${EnvName}_async_jobs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      Tags:
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  # API 로그 테이블: 일자/엔드포인트 그룹별 API 호출 로그와 request_id trace를 저장한다.
  ApiLogsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub lovv_${EnvName}_api_logs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: request_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      GlobalSecondaryIndexes:
        - IndexName: GSI1RequestLookup
          KeySchema:
            - AttributeName: request_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  # 콘텐츠 문서 테이블: 추천 후보 콘텐츠 문서의 정규화 결과를 저장한다. TTL을 적용하지 않는다.
  ContentDocumentsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub lovv_${EnvName}_content_documents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  # 방문 통계 테이블: 도시별/기간별 방문 통계를 저장한다. TTL을 적용하지 않는다.
  VisitorStatisticsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub lovv_${EnvName}_visitor_statistics
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  # Auth refresh token 세션 테이블: sessionId 기준 세션과 refresh token hash 조회를 지원한다.
  AuthSessionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub lovv_${EnvName}_auth_sessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: refreshTokenHash
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      TimeToLiveSpecification:
        # Auth session TTL은 애플리케이션이 기록하는 expiresAt epoch seconds 값이다.
        AttributeName: expiresAt
        Enabled: true
      GlobalSecondaryIndexes:
        - IndexName: GSI1RefreshTokenHashLookup
          KeySchema:
            - AttributeName: refreshTokenHash
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName

  # 이미지 버킷: avatar/content/tmp prefix를 사용하며 직접 public access는 차단한다.
  ImageBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub lovv-image-${EnvName}-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireTemporaryUploads
            Status: Enabled
            # 임시 업로드 객체는 7일 후 만료한다.
            Prefix: tmp/
            ExpirationInDays: 7
      Tags:
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName
        - Key: StackBoundary
          Value: DataStack

  # 이미지 CDN용 OAC: CloudFront가 S3 REST endpoint에 SigV4 서명 요청을 보내도록 한다.
  ImageCloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub lovv-${EnvName}-image-oac
        Description: !Sub Read-only OAC for Lovv ${EnvName} image bucket.
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # 이미지 CDN: 프론트에는 S3 URL 대신 이 CloudFront endpoint만 전달한다.
  ImageCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub Lovv ${EnvName} read-only image CDN.
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_100
        Origins:
          - Id: LovvImageBucketOrigin
            DomainName: !GetAtt ImageBucket.RegionalDomainName
            OriginAccessControlId: !Ref ImageCloudFrontOriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: LovvImageBucketOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
      Tags:
        - Key: Project
          Value: Lovv
        - Key: Environment
          Value: !Ref EnvName
        - Key: StackBoundary
          Value: DataStack

  # 이미지 버킷 정책: CloudFront OAC distribution에만 객체 읽기 권한을 부여한다.
  ImageBucketReadOnlyPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ImageBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontReadOnlyGetObject
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${ImageBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${ImageCloudFrontDistribution}

  # SAM 앱 스택이 RDS host를 직접 하드코딩하지 않도록 SSM parameter로 공개한다.
  RDSHostParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/rds/host
      Type: String
      Value: !GetAtt LovvRDSInstance.Endpoint.Address

  # SAM Lambda VpcConfig 구성을 위한 VPC ID 공개값이다.
  VpcIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/network/vpc_id
      Type: String
      Value: !Ref LovvDevVPC

  # SAM Lambda VpcConfig 구성을 위한 private subnet A 공개값이다.
  PrivateSubnetAParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/network/private_subnet_a
      Type: String
      Value: !Ref LovvPrivateSubnetA

  # SAM Lambda VpcConfig 구성을 위한 private subnet C 공개값이다.
  PrivateSubnetCParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/network/private_subnet_c
      Type: String
      Value: !Ref LovvPrivateSubnetC

  # 선택 NAT 인스턴스 운영을 위한 public subnet 공개값이다.
  PublicSubnetAParameter:
    Type: AWS::SSM::Parameter
    Condition: CreateNatInstance
    Properties:
      Name: !Sub /lovv/${EnvName}/network/public_subnet_a
      Type: String
      Value: !Ref LovvPublicSubnetA

  # RDS 접근 경로 확인과 보안 그룹 연동을 위한 RDS security group 공개값이다.
  RDSSecurityGroupParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/network/rds_security_group
      Type: String
      Value: !Ref LovvRDSSecurityGroup

  # Interface endpoint security group 공개값이다.
  EndpointSecurityGroupParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/network/endpoint_security_group
      Type: String
      Value: !Ref LovvEndpointSecurityGroup

  NatInstanceIdParameter:
    Type: AWS::SSM::Parameter
    Condition: CreateNatInstance
    Properties:
      Name: !Sub /lovv/${EnvName}/network/nat_instance_id
      Type: String
      Value: !Ref LovvNatInstance

  NatInstanceSecurityGroupParameter:
    Type: AWS::SSM::Parameter
    Condition: CreateNatInstance
    Properties:
      Name: !Sub /lovv/${EnvName}/network/nat_instance_security_group
      Type: String
      Value: !Ref LovvNatInstanceSecurityGroup

  # SAM 앱이 사용할 DB 이름 공개값이다.
  RDSDatabaseNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/rds/db_name
      Type: String
      Value: !Ref LovvDbName

  # DB 비밀번호 자체가 아니라 Secrets Manager ARN만 공개한다.
  RDSSecretArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/rds/secret_arn
      Type: String
      Value: !GetAtt LovvRDSInstance.MasterUserSecret.SecretArn

  # DynamoDB 테이블 이름은 환경별 물리명 대신 SSM parameter를 통해 참조한다.
  UserEventLogsTableParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/ddb/user_event_logs
      Type: String
      Value: !Ref UserEventLogsTable

  AgentRunsTableParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/ddb/agent_runs
      Type: String
      Value: !Ref AgentRunsTable

  FestivalVerifyCacheTableParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/ddb/festival_verify_cache
      Type: String
      Value: !Ref FestivalVerifyCacheTable

  AsyncJobsTableParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/ddb/async_jobs
      Type: String
      Value: !Ref AsyncJobsTable

  ApiLogsTableParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/ddb/api_logs
      Type: String
      Value: !Ref ApiLogsTable

  ContentDocumentsTableParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/ddb/content_documents
      Type: String
      Value: !Ref ContentDocumentsTable

  VisitorStatisticsTableParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/ddb/visitor_statistics
      Type: String
      Value: !Ref VisitorStatisticsTable

  AuthSessionsTableParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/ddb/auth_sessions
      Type: String
      Value: !Ref AuthSessionsTable

  ImageBucketParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/s3/image_bucket
      Type: String
      Value: !Ref ImageBucket

  ImageCdnDomainParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/cloudfront/image_domain
      Type: String
      Value: !GetAtt ImageCloudFrontDistribution.DomainName

  ImageCdnBaseUrlParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /lovv/${EnvName}/cloudfront/image_base_url
      Type: String
      Value: !Sub https://${ImageCloudFrontDistribution.DomainName}

# Outputs: 배포 직후 CloudFormation 콘솔/CLI에서 확인할 수 있는 주요 식별자이다.
Outputs:
  VpcId:
    Description: Development VPC ID.
    Value: !Ref LovvDevVPC
  PrivateSubnetA:
    Description: Development private subnet A ID.
    Value: !Ref LovvPrivateSubnetA
  PrivateSubnetC:
    Description: Development private subnet C ID.
    Value: !Ref LovvPrivateSubnetC
  PublicSubnetA:
    Condition: CreateNatInstance
    Description: Development public subnet A ID for the optional NAT instance.
    Value: !Ref LovvPublicSubnetA
  RDSSecurityGroup:
    Description: Development RDS security group ID.
    Value: !Ref LovvRDSSecurityGroup
  EndpointSecurityGroup:
    Description: Development interface endpoint security group ID.
    Value: !Ref LovvEndpointSecurityGroup
  NatInstanceId:
    Condition: CreateNatInstance
    Description: Optional development NAT instance ID.
    Value: !Ref LovvNatInstance
  NatInstanceSecurityGroup:
    Condition: CreateNatInstance
    Description: Optional development NAT instance security group ID.
    Value: !Ref LovvNatInstanceSecurityGroup
  RDSHost:
    Description: RDS endpoint host.
    Value: !GetAtt LovvRDSInstance.Endpoint.Address
  RDSDatabaseName:
    Description: RDS database name.
    Value: !Ref LovvDbName
  RDSSecretArn:
    Description: RDS managed master user secret ARN.
    Value: !GetAtt LovvRDSInstance.MasterUserSecret.SecretArn
  ImageBucketName:
    Description: S3 image bucket name.
    Value: !Ref ImageBucket
  ImageCdnDistributionId:
    Description: Read-only CloudFront distribution ID for the S3 image bucket.
    Value: !Ref ImageCloudFrontDistribution
  ImageCdnDomainName:
    Description: Read-only CloudFront distribution domain for frontend image delivery.
    Value: !GetAtt ImageCloudFrontDistribution.DomainName
  ImageCdnBaseUrl:
    Description: HTTPS base URL for frontend image delivery.
    Value: !Sub https://${ImageCloudFrontDistribution.DomainName}
  UserEventLogsTableName:
    Value: !Ref UserEventLogsTable
  AgentRunsTableName:
    Value: !Ref AgentRunsTable
  FestivalVerifyCacheTableName:
    Value: !Ref FestivalVerifyCacheTable
  AsyncJobsTableName:
    Value: !Ref AsyncJobsTable
  ApiLogsTableName:
    Value: !Ref ApiLogsTable
  ContentDocumentsTableName:
    Value: !Ref ContentDocumentsTable
  VisitorStatisticsTableName:
    Value: !Ref VisitorStatisticsTable
  AuthSessionsTableName:
    Value: !Ref AuthSessionsTable
